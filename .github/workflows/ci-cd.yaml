name: CouponSync CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Restore node_modules cache
        uses: actions/cache@v3
        id: cache
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          echo "📦 Installing backend dependencies..."
          if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: |
          echo "📦 Installing frontend dependencies..."
          if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi

      - name: Build backend
        working-directory: ./backend
        run: |
          echo "🏗️  Building backend..."
          npm run build || echo "⚠️  No backend build script"

      - name: Build frontend
        working-directory: ./frontend
        env:
          CI: false
        run: |
          echo "🏗️  Building frontend..."
          npm run build || echo "⚠️  No frontend build script"

      - name: Create zip artifact
        run: |
          mkdir -p artifacts
          ART=artifacts/build-output.zip
          # include frontend output
          if [ -d "frontend/build" ]; then zip -r "$ART" frontend/build || true; fi
          if [ -d "frontend/.next" ]; then zip -r "$ART" frontend/.next || true; fi
          # include backend output
          if [ -d "backend/dist" ]; then zip -r "$ART" backend/dist || true; fi
          # include package.json for reference
          [ -f frontend/package.json ] && zip -ur "$ART" frontend/package.json || true
          [ -f backend/package.json ] && zip -ur "$ART" backend/package.json || true
          # ensure artifact exists (create placeholder if nothing to zip)
          if [ ! -f "$ART" ]; then
            echo "No build outputs found" > artifacts/NO_BUILD_OUTPUT.txt
            zip -r "$ART" artifacts/NO_BUILD_OUTPUT.txt || true
          fi
          ls -lah artifacts || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: artifacts/build-output.zip
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install deps if missing
        run: |
          cd backend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi
          cd ../frontend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi
          cd ..

      - name: Run ESLint (backend -> json report)
        working-directory: ./backend
        run: |
          mkdir -p ../lint
          if find . -name '*.js' -print -quit >/dev/null 2>&1; then
            npx eslint . --ext .js --format json -o ../lint/backend-eslint.json || true
          else
            echo "{}" > ../lint/backend-eslint.json
          fi

      - name: Run ESLint (frontend -> json report)
        working-directory: ./frontend
        env:
          CI: true
        run: |
          mkdir -p ../lint
          if [ -d src ] && find src -name '*.js' -o -name '*.jsx' | grep -q .; then
            npx eslint src --ext .js,.jsx --format json -o ../lint/frontend-eslint.json || true
          else
            echo "{}" > ../lint/frontend-eslint.json
          fi

      - name: (optional) Run pylint (if Python files exist)
        run: |
          mkdir -p lint
          if git ls-files | grep -E '\.py$' >/dev/null 2>&1; then
            python -m pip install --upgrade pip
            pip install pylint >/dev/null 2>&1 || true
            if find . -name '*.py' -print -quit >/dev/null 2>&1; then
              pylint --output-format=json $(git ls-files '*.py') > lint/pylint.json || true
            fi
          else
            echo "{}" > lint/pylint.json
          fi

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: lint/
          retention-days: 7

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install deps if missing
        run: |
          cd backend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi
          cd ../frontend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi

      - name: Backend unit tests
        working-directory: ./backend
        run: |
          echo "🧪 Running backend tests..."
          npm test -- --passWithNoTests --coverage || true

      - name: Frontend unit tests
        working-directory: ./frontend
        env:
          CI: true
        run: |
          echo "🧪 Running frontend tests..."
          npm test -- --coverage --watchAll=false --passWithNoTests || true

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            backend/coverage/
            frontend/coverage/
          retention-days: 7

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: coverage-artifacts

      - name: Check coverage files
        run: |
          echo "🔎 Checking coverage outputs..."
          if ls coverage-artifacts/backend/coverage 1> /dev/null 2>&1 || ls coverage-artifacts/frontend/coverage 1> /dev/null 2>&1; then
            echo "✅ Coverage reports found"
          else
            echo "⚠️ Coverage reports not found"
            ls -R coverage-artifacts || true
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: coverage

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Restore node_modules cache
        uses: actions/cache@v3
        with:
          path: |
            backend/node_modules
            frontend/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install deps if missing
        run: |
          cd backend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi
          cd ../frontend
          if [ ! -d node_modules ]; then
            if [ -f package-lock.json ]; then npm ci --legacy-peer-deps; else npm install --legacy-peer-deps; fi
          fi

      - name: Run npm audit (backend)
        working-directory: ./backend
        run: |
          echo "🛡️  Running npm audit for backend..."
          npm audit --json > audit-backend.json || true
          cat audit-backend.json || true

      - name: Run npm audit (frontend)
        working-directory: ./frontend
        run: |
          echo "🛡️  Running npm audit for frontend..."
          npm audit --json > audit-frontend.json || true
          cat audit-frontend.json || true

      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: audit-reports
          path: |
            backend/audit-backend.json
            frontend/audit-frontend.json
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: artifacts

      - name: Verify downloaded artifact
        run: |
          echo "Artifacts directory contents:"
          ls -lah artifacts || true
          if [ ! -f artifacts/build-output.zip ]; then
            echo "❌ build-output.zip not found in artifacts/ — aborting deploy step"
            ls -R || true
            exit 1
          fi

      - name: Unpack build artifact
        run: |
          mkdir -p artifacts/extracted
          unzip -o artifacts/build-output.zip -d artifacts/extracted || true
          ls -R artifacts/extracted || true

      - name: Deploy extracted build (placeholder)
        run: |
          echo "🚀 Deploying to ${{ github.ref }} (replace with real deploy commands)"
          if [ -d "artifacts/extracted/frontend/build" ]; then
            echo "Deploying static frontend..."
            # scp -r artifacts/extracted/frontend/build/ user@server:/path || true
          fi
          if [ -d "artifacts/extracted/frontend/.next" ]; then
            echo "Deploying Next.js frontend..."
            # scp -r artifacts/extracted/frontend/.next/ user@server:/path || true
          fi
          if [ -d "artifacts/extracted/backend/dist" ]; then
            echo "Deploying backend..."
            # scp -r artifacts/extracted/backend/dist/ user@server:/path || true
          fi

      - name: Smoke tests (placeholder)
        run: |
          echo "🧪 Running smoke tests (replace with real checks)"
          # curl -f https://your-app.example.com/api/health || exit 1
          echo "✅ Smoke tests passed"